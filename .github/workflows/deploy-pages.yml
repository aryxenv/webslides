# Build and deploy the slide deck to GitHub Pages.
#
# This runs automatically on every push to the default branch, so sharing a
# deck is just "git push" — the latest slides go live at
#   https://<owner>.github.io/<repo>/
#
# One-time setup in the repo: Settings → Pages → Build and deployment →
# Source: "GitHub Actions". After that this workflow handles everything.
name: Deploy slides to Pages

on:
  push:
    branches: ["main"]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions needed for the GITHUB_TOKEN to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Serve assets from the repo subpath (project Pages). Auto-detected
          # from the repo name, so the template works in any repo with no edits.
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
